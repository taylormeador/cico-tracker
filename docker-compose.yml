services:
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://cico:${DB_PASSWORD}@10.0.10.123:5432/cico
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
