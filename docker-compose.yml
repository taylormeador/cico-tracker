services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "8501"
    environment:
      - API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    env_file:
      - ./backend/.env
    restart: unless-stopped
